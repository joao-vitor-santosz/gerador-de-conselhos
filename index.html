<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="./src/images/favicon-32x32.png" type="image/x-icon">

    <title>Gerador de conselhos</title>
</head>
<body>
    <main>
        <div class="cartao-conselho">
            <p class="numeracao-conselho">advice #117</p>
            <p class="conselho" id="conselho">"It is easy to sit up and take notice, what's difficult is getting up and taking action."</p>

            <picture>
                <source srcset="./src/images/pattern-divider-mobile.svg" media="(max-width: 768px)">     
                <img class="separecao" src="./src/images/pattern-divider-desktop.svg" alt="">
            </picture>
            
            <button class="botao" id="btn">
                    <img src="./src/images/icon-dice.svg" alt="">
            </button>
        </div>
    </main>

    <script src="./src/js/index.js"></script>

</html>
